name: Gradle Publish and Release

on:
  push:
    branches:
      - 1.21.1
      - 1.21.11
      - 26.1.2
      - 26.2

jobs:
  publish-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: adopt
          java-version: 21
          cache: gradle

      - name: Configure Gradle secrets
        run: |
          mkdir -p ~/.gradle/
          echo "GRADLE_USER_HOME=${HOME}/.gradle" >> $GITHUB_ENV
          echo "${{ secrets.REPO_LOGIN }}" > ~/.gradle/gradle.properties
          echo "curseforge_token=${{ secrets.CURSEFORGE_TOKEN }}" >> ~/.gradle/gradle.properties
          echo "modrinth_token=${{ secrets.MODRINTH_TOKEN }}" >> ~/.gradle/gradle.properties

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Build and Publish to Maven
        run: ./gradlew publish publishAllPublicationsToJTDev-Maven-RepositoryRepository

      - name: Check version
        id: gate
        run: |
          VERSION=$(grep 'mod_version' gradle.properties | cut -d'=' -f2 | xargs)
          MC_VERSION=$(grep 'minecraft_version' gradle.properties | cut -d'=' -f2 | xargs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "mc_version=$MC_VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" != *"-SNAPSHOT"* ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "Proceeding with release for version: $VERSION (MC $MC_VERSION)"
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Snapshot detected ($VERSION). Skipping release steps."
          fi

      - name: Publish Fabric
        if: steps.gate.outputs.is_release == 'true'
        run: ./gradlew :fabric:publishMod

      - name: Publish Forge
        if: steps.gate.outputs.is_release == 'true'
        run: ./gradlew :forge:publishMod

      - name: Publish NeoForge
        if: steps.gate.outputs.is_release == 'true'
        run: ./gradlew :neoforge:publishMod

      - name: Check if release exists
        if: steps.gate.outputs.is_release == 'true'
        id: release_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.gate.outputs.version }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "release_exists=true" >> $GITHUB_OUTPUT
            echo "Release $TAG already exists, will append jars."
          else
            echo "release_exists=false" >> $GITHUB_OUTPUT
            echo "Release $TAG does not exist, will create new release."
          fi

      - name: Extract Changelog Section
        if: steps.gate.outputs.is_release == 'true' && steps.release_check.outputs.release_exists == 'false'
        run: |
          VERSION="${{ steps.gate.outputs.version }}"
          sed -n "/# $VERSION/,/#/p" CHANGELOG.md | grep -v "#" > release_notes.txt
          echo "Notes extracted:"
          cat release_notes.txt

      - name: Create GitHub Release
        if: steps.gate.outputs.is_release == 'true' && steps.release_check.outputs.release_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.gate.outputs.version }}
          name: ${{ steps.gate.outputs.version }}
          body_path: release_notes.txt

      - name: Upload Jars to Release
        if: steps.gate.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.gate.outputs.version }}"
          find Fabric/build/libs NeoForge/build/libs Forge/build/libs \
            -name "*.jar" \
            ! -name "*-dev-shadow.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-dev.jar" \
            2>/dev/null | xargs gh release upload "$TAG" --clobber

      - name: Bump patch version and add SNAPSHOT
        if: steps.gate.outputs.is_release == 'true' && steps.release_check.outputs.release_exists == 'false'
        id: bump_version
        run: |
          VERSION="${{ steps.gate.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d'.' -f1)
          MINOR=$(echo "$VERSION" | cut -d'.' -f2)
          PATCH=$(echo "$VERSION" | cut -d'.' -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-SNAPSHOT"
          echo "Bumping version: $VERSION -> $NEXT_VERSION"
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          sed -i "s/^mod_version=.*/mod_version=$NEXT_VERSION/" gradle.properties

      - name: Commit and push version bump
        if: steps.gate.outputs.is_release == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "${{ steps.bump_version.outputs.next_version }} Cycle"
          file_pattern: gradle.properties